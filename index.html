<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2ZmNTJlMSI+PHBhdGggZD0iTTEyIDJMMy41IDEyIDEyIDIyIDIwLjUgMTIgMTIgMloiLz48L3N2Zz4=" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SwipeVerse</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ff52e1">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&family=MedievalSharp&family=Orbitron:wght@400..900&family=Cinzel:wght@600;700;800&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://esm.sh/reactflow@^11.11.4/dist/style.css">
    <style>
      body {
        overscroll-behavior: none;
      }
      .font-orbitron { font-family: 'Orbitron', sans-serif; }
      .font-medieval { font-family: 'MedievalSharp', cursive; }
      .font-exo { font-family: 'Exo 2', sans-serif; }
      .font-cinzel { font-family: 'Cinzel', serif; }
      .text-shadow { text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px rgba(255, 82, 225, 0.5); }

      /* ── Neon Tarot shell theme (design refresh) ──────────────────────
         Token layer: a future alternate shell theme swaps these variables
         (and the component classes below), not the components. */
      :root {
        --tarot-gold: #c9962e;
        --tarot-gold-bright: #f6e4a8;
        --tarot-paper: #e9dfc8;
        --tarot-muted: #9a8db4;
        --tarot-velvet: #0d0718;
        --tarot-velvet-2: #120a22;
        --tarot-danger: #ff5d5d;
      }
      .bg-velvet { background: radial-gradient(120% 100% at 50% 0%, #1c1030 0%, #0d0718 55%, #060310 100%); }
      .text-gold-gradient {
        background: linear-gradient(180deg, var(--tarot-gold-bright), var(--tarot-gold) 60%, #8a6a1c);
        -webkit-background-clip: text; background-clip: text; color: transparent;
        filter: drop-shadow(0 0 18px rgba(201, 150, 46, 0.35));
      }
      .tarot-frame {
        border: 2px solid var(--tarot-gold);
        box-shadow: inset 0 0 0 6px var(--tarot-velvet-2), inset 0 0 0 7px rgba(201,150,46,.5), 0 26px 60px rgba(0,0,0,.75);
        background: var(--tarot-velvet-2);
      }
      .tarot-plaque {
        border: 1px solid rgba(201, 150, 46, 0.5);
        background: linear-gradient(180deg, rgba(201,150,46,.10), rgba(201,150,46,.03));
        color: var(--tarot-paper);
      }
      .tarot-plaque:hover { border-color: var(--tarot-gold-bright); background: linear-gradient(180deg, rgba(201,150,46,.18), rgba(201,150,46,.06)); }
      .tarot-seal {
        background: radial-gradient(circle at 35% 30%, #d44a6f, #7c1230 70%);
        box-shadow: 0 4px 14px rgba(0,0,0,.6), inset 0 0 0 3px rgba(255,255,255,.15);
      }
      .animate-tarot-rise { animation: tarot-rise .55s cubic-bezier(.2,.8,.3,1); }
      @keyframes tarot-rise {
        from { transform: translateY(70px) rotate(2deg); opacity: 0; }
        to { transform: none; opacity: 1; }
      }
      .animate-orb-danger { animation: orb-danger 1.2s ease-in-out infinite; }
      @keyframes orb-danger {
        50% { box-shadow: 0 0 30px var(--tarot-danger); }
      }
      /* ── CRT Arcade shell ─────────────────────────────────────────── */
      .font-pixel { font-family: 'Press Start 2P', monospace; }
      .font-vt { font-family: 'VT323', monospace; }
      .crt-bezel {
        background: linear-gradient(160deg, #23252b, #101114);
        border-radius: 28px;
        box-shadow: 0 30px 80px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.08);
      }
      .crt-screen {
        position: relative;
        border-radius: 18px;
        overflow: hidden;
        background: radial-gradient(120% 90% at 50% 10%, #131a2e 0%, #090b14 70%);
      }
      .crt-screen::before {
        content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 40;
        background: repeating-linear-gradient(0deg, rgba(0,0,0,.22) 0 1px, transparent 1px 3px);
        mix-blend-mode: multiply;
      }
      .crt-screen::after {
        content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 40;
        background: radial-gradient(90% 70% at 50% 45%, transparent 55%, rgba(0,0,0,.55) 100%);
      }
      .crt-glow-pink { text-shadow: 0 0 14px rgba(255,82,225,.8), 0 0 40px rgba(255,82,225,.4); }
      .animate-crt-boot { animation: crt-boot .8s ease-out; }
      @keyframes crt-boot {
        0% { opacity: 0; transform: scaleY(.02); }
        35% { opacity: 1; transform: scaleY(1.02); }
        55% { transform: scaleY(.99); }
        100% { transform: scaleY(1); }
      }
      .animate-crt-in { animation: crt-in .45s ease-out; }
      @keyframes crt-in {
        0% { opacity: 0; filter: brightness(3); transform: scaleY(.6); }
        60% { opacity: 1; filter: brightness(1.6); transform: scaleY(1.01); }
        100% { filter: none; transform: none; }
      }
      .animate-blink { animation: hard-blink 1.1s steps(1) infinite; }
      .animate-blink-fast { animation: hard-blink .5s steps(1) infinite; }
      @keyframes hard-blink { 50% { opacity: 0; } }

      /* ── Handheld shell ───────────────────────────────────────────── */
      .hh-body {
        background: linear-gradient(165deg, #8d87c9, #5f5a9e 60%, #4a4680);
        border-radius: 26px 26px 64px 26px;
        box-shadow: 0 30px 70px rgba(0,0,0,.7), inset 0 2px 0 rgba(255,255,255,.35), inset 0 -6px 12px rgba(0,0,0,.25);
      }
      .hh-screenframe { background: #2c2a4d; box-shadow: inset 0 3px 8px rgba(0,0,0,.6); }
      .hh-screen { background: #0f1a14; position: relative; box-shadow: inset 0 0 0 2px rgba(163,255,190,.08); }
      .hh-screen::after {
        content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 40;
        background: linear-gradient(rgba(163,255,190,.05), rgba(163,255,190,.02));
        mix-blend-mode: screen;
      }
      .hh-green { color: #a3ffbe; text-shadow: 0 0 8px rgba(163,255,190,.5); }
      .animate-hh-in { animation: hh-in .35s steps(6); }
      @keyframes hh-in { from { transform: translateX(105%); } to { transform: none; } }
      .animate-hh-on { animation: hh-on .5s ease-out; }
      @keyframes hh-on { from { filter: brightness(3) saturate(0); } to { filter: none; } }

      @media (prefers-reduced-motion: reduce) {
        .animate-tarot-rise, .animate-orb-danger, .animate-pulse-fast, .animate-fade-in,
        .animate-crt-boot, .animate-crt-in, .animate-blink, .animate-blink-fast,
        .animate-hh-in, .animate-hh-on { animation: none !important; }
      }
      .animate-pulse-fast { animation: pulse-fast 1s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      @keyframes pulse-fast {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: .8; transform: scale(1.1); }
      }
      .animate-fade-in { animation: fade-in 0.75s ease-out forwards; }
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .react-flow__handle {
        background: #ff52e1 !important;
        border: 2px solid white !important;
      }
      .react-flow__edge-path {
          stroke: #ff52e1 !important;
          stroke-width: 2 !important;
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'cyber-pink': '#ff52e1',
              'cyber-cyan': '#00f2ff',
              'mystic-purple': '#a45cff',
              'mystic-gold': '#ffc857',
              'space-blue': '#4d9eff',
              'space-silver': '#c0c0c0',
              'tarot-gold': '#c9962e',
              'tarot-gold-bright': '#f6e4a8',
              'tarot-paper': '#e9dfc8',
              'tarot-muted': '#9a8db4',
              'tarot-velvet': '#0d0718',
              'tarot-velvet-2': '#120a22',
            },
             animation: {
              'fade-in': 'fade-in 0.75s ease-out forwards',
              'pulse-fast': 'pulse-fast 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              'fade-in': {
                'from': { opacity: 0, transform: 'translateY(-10px)' },
                'to': { opacity: 1, transform: 'translateY(0)' },
              },
              'pulse-fast': {
                '0%, 100%': { opacity: '1', transform: 'scale(1)' },
                '50%': { opacity: '.8', transform: 'scale(1.1)' },
              }
            }
          }
        }
      }
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
              .then(registration => console.log('Service Worker registered:', registration.scope))
              .catch(error => console.log('Service Worker registration failed:', error));
          });
        }
    </script>
</body>
</html>
