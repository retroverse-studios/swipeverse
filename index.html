    <link rel="stylesheet" href="https://esm.sh/reactflow@^11.11.4/dist/style.css">
    <style>
      body {
        overscroll-behavior: none;
      }
      .font-orbitron { font-family: 'Orbitron', sans-serif; }
      .font-medieval { font-family: 'MedievalSharp', cursive; }
      .font-exo { font-family: 'Exo 2', sans-serif; }
      .font-cinzel { font-family: 'Cinzel', serif; }
      .text-shadow { text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px rgba(255, 82, 225, 0.5); }

      /* ── Neon Tarot shell theme (design refresh) ──────────────────────
         Token layer: a future alternate shell theme swaps these variables
         (and the component classes below), not the components. */
      :root {
        --tarot-gold: #c9962e;
        --tarot-gold-bright: #f6e4a8;
        --tarot-paper: #e9dfc8;
        --tarot-muted: #9a8db4;
        --tarot-velvet: #0d0718;
        --tarot-velvet-2: #120a22;
        --tarot-danger: #ff5d5d;
      }
      .bg-velvet { background: radial-gradient(120% 100% at 50% 0%, #1c1030 0%, #0d0718 55%, #060310 100%); }
      .text-gold-gradient {
        background: linear-gradient(180deg, var(--tarot-gold-bright), var(--tarot-gold) 60%, #8a6a1c);
        -webkit-background-clip: text; background-clip: text; color: transparent;
        filter: drop-shadow(0 0 18px rgba(201, 150, 46, 0.35));
      }
      .tarot-frame {
        border: 2px solid var(--tarot-gold);
        box-shadow: inset 0 0 0 6px var(--tarot-velvet-2), inset 0 0 0 7px rgba(201,150,46,.5), 0 26px 60px rgba(0,0,0,.75);
        background: var(--tarot-velvet-2);
      }
      .tarot-plaque {
        border: 1px solid rgba(201, 150, 46, 0.5);
        background: linear-gradient(180deg, rgba(201,150,46,.10), rgba(201,150,46,.03));
        color: var(--tarot-paper);
      }
      .tarot-plaque:hover { border-color: var(--tarot-gold-bright); background: linear-gradient(180deg, rgba(201,150,46,.18), rgba(201,150,46,.06)); }
      .tarot-seal {
        background: radial-gradient(circle at 35% 30%, #d44a6f, #7c1230 70%);
        box-shadow: 0 4px 14px rgba(0,0,0,.6), inset 0 0 0 3px rgba(255,255,255,.15);
      }
      .animate-tarot-rise { animation: tarot-rise .55s cubic-bezier(.2,.8,.3,1); }
      @keyframes tarot-rise {
        from { transform: translateY(70px) rotate(2deg); opacity: 0; }
        to { transform: none; opacity: 1; }
      }
      .animate-orb-danger { animation: orb-danger 1.2s ease-in-out infinite; }
      @keyframes orb-danger {
        50% { box-shadow: 0 0 30px var(--tarot-danger); }
      }
      @media (prefers-reduced-motion: reduce) {
        .animate-tarot-rise, .animate-orb-danger, .animate-pulse-fast, .animate-fade-in { animation: none !important; }
      }
      .animate-pulse-fast { animation: pulse-fast 1s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      @keyframes pulse-fast {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: .8; transform: scale(1.1); }
      }
      .animate-fade-in { animation: fade-in 0.75s ease-out forwards; }
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .react-flow__handle {
        background: #ff52e1 !important;
        border: 2px solid white !important;
      }
      .react-flow__edge-path {
          stroke: #ff52e1 !important;
          stroke-width: 2 !important;
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'cyber-pink': '#ff52e1',
              'cyber-cyan': '#00f2ff',
              'mystic-purple': '#a45cff',
              'mystic-gold': '#ffc857',
              'space-blue': '#4d9eff',
              'space-silver': '#c0c0c0',
              'tarot-gold': '#c9962e',
              'tarot-gold-bright': '#f6e4a8',
              'tarot-paper': '#e9dfc8',
              'tarot-muted': '#9a8db4',
              'tarot-velvet': '#0d0718',
              'tarot-velvet-2': '#120a22',
            },
             animation: {
              'fade-in': 'fade-in 0.75s ease-out forwards',
              'pulse-fast': 'pulse-fast 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              'fade-in': {
                'from': { opacity: 0, transform: 'translateY(-10px)' },
                'to': { opacity: 1, transform: 'translateY(0)' },
              },
              'pulse-fast': {
                '0%, 100%': { opacity: '1', transform: 'scale(1)' },
                '50%': { opacity: '.8', transform: 'scale(1.1)' },
              }
            }
          }
        }
      }
    </script>
